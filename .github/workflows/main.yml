name: CI/CD Pipeline

on:
  push:
    branches: [ main ]  # 当 main 分支有推送时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录 Docker Hub（需替换 secrets）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # 在 Settings-Secrets 中配置
          password: ${{ secrets.DOCKER_PASSWORD }}  # 在 Settings-Secrets 中配置

      # 3. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: nanfengfenfei/simple-web-cicd:latest   # 改成你的 Docker ID

      # 4. 部署到云服务器（需替换 secrets）
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3  # 建议升级到最新版
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo docker pull nanfengfenfei/simple-web-cicd:latest
            sudo docker stop simple-web || true
            sudo docker rm simple-web || true
            sudo docker run -d -p 80:5000 --name simple-web nanfengfenfei/simple-web-cicd:latest
